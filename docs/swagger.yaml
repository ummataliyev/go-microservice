basePath: /
definitions:
  go-microservice_internal_dto.CreateUserRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secret123
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-microservice_internal_dto.DeleteResponse:
    properties:
      id:
        type: integer
      status:
        type: string
    type: object
  go-microservice_internal_dto.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        type: string
    required:
    - email
    - password
    type: object
  go-microservice_internal_dto.MeResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      updated_at:
        type: string
    type: object
  go-microservice_internal_dto.PaginationMeta:
    properties:
      current_page:
        type: integer
      has_next:
        type: boolean
      has_previous:
        type: boolean
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  go-microservice_internal_dto.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  go-microservice_internal_dto.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-microservice_internal_dto.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  go-microservice_internal_dto.UpdateUserRequest:
    properties:
      email:
        example: new@example.com
        type: string
      password:
        example: newsecret123
        minLength: 6
        type: string
    type: object
  go-microservice_internal_dto.UserListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/go-microservice_internal_dto.UserResponse'
        type: array
      meta:
        $ref: '#/definitions/go-microservice_internal_dto.PaginationMeta'
    type: object
  go-microservice_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      updated_at:
        type: string
    type: object
  go-microservice_internal_errors.ErrorBody:
    properties:
      message:
        type: string
      request_id:
        type: string
      type:
        type: string
    type: object
  go-microservice_internal_errors.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/go-microservice_internal_errors.ErrorBody'
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API with authentication, user management, and health checks.
  title: Go Microservice API
  version: 0.1.0
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Application info
      tags:
      - health
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      summary: Login with credentials
      tags:
      - auth
  /api/v1/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/v1/users/:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.UserListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      parameters:
      - description: User data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a user
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      parameters:
      - description: user_id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.DeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    get:
      parameters:
      - description: user_id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    patch:
      consumes:
      - application/json
      parameters:
      - description: user_id
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-microservice_internal_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - users
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /live:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - health
  /ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - health
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
